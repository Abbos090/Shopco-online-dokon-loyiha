<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../css/shared.css" />
    <link rel="stylesheet" href="../css/style.css" />
    <script defer src="../js/index.js"></script>
  </head>
  <body>
    <header class="header">
      <div class="container">
        <div class="header__wrapper">
          <img
            src="../assets/SHOP.CO.svg"
            alt="Company logo"
            class="header__img logo"
          />
          <div class="header__buttons">
            <button class="login btn">Login</button>
            <button class="signup btn">Sign Up</button>
          </div>
        </div>
      </div>
    </header>

    <main>
      <section class="hero">
        <div class="container">
          <div class="hero__wrapper">
            <div class="hero__info">
              <h1 class="hero__title">FIND CLOTHES THAT MATCHES YOUR STYLE</h1>
              <p class="hero__text">
                Browse through our diverse range of meticulously crafted
                garments, designed to bring out your individuality and cater to
                your sense of style.
              </p>
              <button type="button" class="hero__btn btn">Shop Now</button>
            </div>
            <img src="../assets/hero image.jpg" alt="Rasm" class="hero__img">
          </div>
        </div>
      </section>
    </main>
  </body>
</html>
